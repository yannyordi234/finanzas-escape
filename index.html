<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Marketing IA — Financial Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#111;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.header{background:linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 50%,#3d1a00 80%,#FF6B00 100%);padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header-title{font-size:10px;color:#FF6B00;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
.header h1{font-size:22px;font-weight:800}
.date-group{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.date-group label{font-size:12px;color:#999}
.date-input{padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;font-size:13px;font-family:inherit;outline:none}
.content{padding:20px 32px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:10px 24px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.tab-btn.active{background:#FF6B00}
.add-btn{margin-left:auto;padding:10px 24px;border-radius:8px;border:1px solid #FF6B00;background:transparent;color:#FF6B00;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.add-btn:hover{background:rgba(255,107,0,0.1)}
.cards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.card{background:#1a1a1a;border-radius:12px;padding:16px 20px;flex:1;min-width:140;border:1px solid #2a2a2a}
.card-label{font-size:11px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.card-value{font-size:24px;font-weight:800}
.card-sub{font-size:11px;color:#999;margin-top:2px}
.main-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.charts-col{display:flex;flex-direction:column;gap:16px;width:320px;min-width:280;flex-shrink:0}
.chart-box{background:#1a1a1a;border-radius:12px;padding:20px;border:1px solid #2a2a2a}
.chart-title{font-size:13px;font-weight:700;margin-bottom:12px}
.table-wrap{background:#1a1a1a;border-radius:12px;border:1px solid #2a2a2a;flex:1;min-width:400;overflow:hidden;display:flex;flex-direction:column;max-height:520px}
.table-header{padding:14px 20px;border-bottom:1px solid #2a2a2a;font-weight:700;font-size:13px;display:flex;justify-content:space-between;flex-shrink:0}
.table-header span:last-child{color:#999;font-weight:400;font-size:12px}
.table-scroll{overflow-y:auto;flex:1}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:1px;background:#1a1a1a;position:sticky;top:0;z-index:1}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #2a2a2a}
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,0.12);color:#22C55E}
.badge-red{background:rgba(239,68,68,0.12);color:#EF4444}
.badge-blue{background:rgba(59,130,246,0.12);color:#3B82F6}
.del-btn{background:transparent;border:none;color:#EF4444;cursor:pointer;font-size:14px;opacity:0.4}
.del-btn:hover{opacity:1}
.empty-row{padding:40px;text-align:center;color:#999;font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#1a1a1a;border-radius:16px;padding:28px;width:90%;max-width:440px;border:1px solid #2a2a2a}
.modal h2{font-size:18px;font-weight:800;margin-bottom:2px}
.modal .sub{font-size:12px;color:#999;margin-bottom:16px}
.form-label{font-size:11px;color:#999;margin-bottom:4px;display:block;margin-top:12px}
.form-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2a2a;background:#111;color:#fff;font-size:14px;outline:none;font-family:inherit}
.form-input:focus{border-color:#FF6B00}
.form-row{display:flex;gap:12px}
.form-row>div{flex:1}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.btn-cancel{flex:1;padding:12px;border-radius:8px;border:1px solid #2a2a2a;background:transparent;color:#fff;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit}
.btn-add{flex:1;padding:12px;border-radius:8px;border:none;background:#FF6B00;color:#fff;cursor:pointer;font-weight:700;font-size:14px;font-family:inherit}
.btn-add:hover{background:#e56000}
.legend{display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:12px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.no-data{height:180px;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Escape Marketing IA</div>
    <h1>Financial Dashboard</h1>
  </div>
  <div class="date-group">
    <label>Desde</label>
    <input type="date" class="date-input" id="dateFrom" value="2026-06-01">
    <label>Hasta</label>
    <input type="date" class="date-input" id="dateTo" value="2026-06-30">
  </div>
</div>

<div class="content">
  <div class="tabs">
    <button class="tab-btn active" id="tabAgency" onclick="switchTab('agency')">💰 Agencia</button>
    <button class="tab-btn" id="tabPersonal" onclick="switchTab('personal')">🏠 Personal</button>
    <button class="add-btn" onclick="openModal()">+ Agregar</button>
  </div>

  <div class="cards" id="cardsContainer"></div>

  <div class="main-row">
    <div class="charts-col">
      <div class="chart-box">
        <div class="chart-title">Ingresos vs Gastos</div>
        <canvas id="pieChart" height="180"></canvas>
        <div class="legend">
          <span><span class="legend-dot" style="background:#22C55E"></span>Ingresos</span>
          <span><span class="legend-dot" style="background:#EF4444"></span>Gastos</span>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-title">Por Categoría</div>
        <canvas id="barChart" height="180"></canvas>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><span>Movimientos</span><span id="tableCount">0 registros</span></div>
      <div class="table-scroll">
        <table>
          <thead><tr><th>Concepto</th><th>Tipo</th><th>Categoría</th><th>Monto</th><th>Fecha</th><th></th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Agregar movimiento</h2>
    <div class="sub" id="modalSub">Finanzas Agencia</div>
    <label class="form-label">Concepto</label>
    <input class="form-input" id="fConcepto" placeholder="Ej: Pago cliente">
    <div class="form-row">
      <div>
        <label class="form-label">Tipo</label>
        <select class="form-input" id="fTipo"></select>
      </div>
      <div>
        <label class="form-label">Categoría</label>
        <select class="form-input" id="fCategoria"></select>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label class="form-label">Monto (COP)</label>
        <input class="form-input" id="fMonto" type="number" placeholder="2000000">
      </div>
      <div>
        <label class="form-label">Fecha</label>
        <input class="form-input" id="fFecha" type="date">
      </div>
    </div>
    <div id="personaField">
      <label class="form-label">Cliente / Persona</label>
      <input class="form-input" id="fPersona" placeholder="FLIP FLOW, Dilan...">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-add" onclick="addEntry()">Agregar</button>
    </div>
  </div>
</div>

<script>
const CATS_A = ["Pago cliente","Pago equipo","Herramienta","Pauta","Oficina","Otro"];
const CATS_P = ["Arriendo","Servicios","Comida","Transporte","Suscripciones","Entretenimiento","Salud","Otro"];
const defA = [
  {id:1,concepto:"Pago FLIP FLOW - Junio",tipo:"Ingreso",categoria:"Pago cliente",monto:2000000,fecha:"2026-06-01",persona:"FLIP FLOW"},
  {id:2,concepto:"Pago Dilan - Junio",tipo:"Gasto",categoria:"Pago equipo",monto:500000,fecha:"2026-06-15",persona:"Dilan Tocora"},
  {id:3,concepto:"Pago Katty - Junio",tipo:"Gasto",categoria:"Pago equipo",monto:400000,fecha:"2026-06-15",persona:"Katty"},
  {id:4,concepto:"Claude Pro",tipo:"Gasto",categoria:"Herramienta",monto:80000,fecha:"2026-06-01",persona:""},
  {id:5,concepto:"Canva Pro",tipo:"Gasto",categoria:"Herramienta",monto:45000,fecha:"2026-06-01",persona:""},
];
const defP = [
  {id:1,concepto:"Arriendo",tipo:"Gasto fijo",categoria:"Arriendo",monto:800000,fecha:"2026-06-01"},
  {id:2,concepto:"Spotify",tipo:"Gasto fijo",categoria:"Suscripciones",monto:17000,fecha:"2026-06-01"},
  {id:3,concepto:"Almuerzo",tipo:"Gasto hormiga",categoria:"Comida",monto:18000,fecha:"2026-06-20"},
];

let tab = "agency";
let agency = JSON.parse(localStorage.getItem("esc_agency")) || defA;
let personal = JSON.parse(localStorage.getItem("esc_personal")) || defP;
let pieChart, barChart;

const fmt = n => new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);

function save(){
  localStorage.setItem("esc_agency", JSON.stringify(agency));
  localStorage.setItem("esc_personal", JSON.stringify(personal));
}

function switchTab(t){
  tab = t;
  document.getElementById("tabAgency").className = "tab-btn" + (t==="agency"?" active":"");
  document.getElementById("tabPersonal").className = "tab-btn" + (t==="personal"?" active":"");
  render();
}

function getFiltered(){
  const from = document.getElementById("dateFrom").value;
  const to = document.getElementById("dateTo").value;
  const data = tab === "agency" ? agency : personal;
  return data.filter(e => e.fecha >= from && e.fecha <= to);
}

function render(){
  const filtered = getFiltered();
  const income = filtered.filter(e=>e.tipo==="Ingreso").reduce((s,e)=>s+e.monto,0);
  const expenses = filtered.filter(e=>e.tipo!=="Ingreso").reduce((s,e)=>s+e.monto,0);
  const profit = income - expenses;
  const cats = tab === "agency" ? CATS_A : CATS_P;

  // Cards
  let cardsHTML = "";
  cardsHTML += cardHTML("Ingresos", fmt(income), "#22C55E");
  cardsHTML += cardHTML("Gastos totales", fmt(expenses), "#EF4444");
  cardsHTML += cardHTML(profit>=0?"Ganancia":"Pérdida", fmt(Math.abs(profit)), profit>=0?"#22C55E":"#EF4444", profit>=0?"✓ Positivo":"✗ Negativo");
  
  if(tab==="personal"){
    const fijo = filtered.filter(e=>e.tipo==="Gasto fijo").reduce((s,e)=>s+e.monto,0);
    const hormiga = filtered.filter(e=>e.tipo==="Gasto hormiga").reduce((s,e)=>s+e.monto,0);
    const hCount = filtered.filter(e=>e.tipo==="Gasto hormiga").length;
    cardsHTML += cardHTML("Gastos fijos", fmt(fijo), "#3B82F6");
    cardsHTML += cardHTML("Gastos hormiga", fmt(hormiga), "#FF6B00", hCount+" movimientos");
  } else {
    const margin = income > 0 ? Math.round((profit/income)*100)+"%" : "0%";
    cardsHTML += cardHTML("Movimientos", filtered.length, "#3B82F6");
    cardsHTML += cardHTML("Margen", margin, profit>=0?"#22C55E":"#EF4444", "Ingreso - Gasto");
  }
  document.getElementById("cardsContainer").innerHTML = cardsHTML;

  // Pie Chart
  if(pieChart) pieChart.destroy();
  const pieCtx = document.getElementById("pieChart").getContext("2d");
  pieChart = new Chart(pieCtx, {
    type: "doughnut",
    data: {
      labels: ["Ingresos","Gastos"],
      datasets: [{data: [income||0, expenses||0], backgroundColor: ["#22C55E","#EF4444"], borderWidth: 0, cutout: "60%"}]
    },
    options: {responsive:true, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}}}
  });

  // Bar Chart
  if(barChart) barChart.destroy();
  const barData = cats.map(c => filtered.filter(e=>e.categoria===c).reduce((s,e)=>s+e.monto,0));
  const barLabels = cats.map(c => c.length > 12 ? c.slice(0,12)+"." : c);
  const barCtx = document.getElementById("barChart").getContext("2d");
  barChart = new Chart(barCtx, {
    type: "bar",
    data: {
      labels: barLabels,
      datasets: [{data: barData, backgroundColor: "#FF6B00", borderRadius: 6, barThickness: 20}]
    },
    options: {
      indexAxis: "y", responsive: true,
      plugins: {legend:{display:false}, tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},
      scales: {
        x: {ticks:{color:"#999",font:{size:10},callback:v=>v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":v},grid:{color:"#222"},border:{display:false}},
        y: {ticks:{color:"#999",font:{size:11}},grid:{display:false},border:{display:false}}
      }
    }
  });

  // Table
  document.getElementById("tableCount").textContent = filtered.length + " registros";
  const sorted = [...filtered].sort((a,b) => b.fecha.localeCompare(a.fecha));
  let tbody = "";
  if(sorted.length === 0){
    tbody = '<tr><td colspan="6" class="empty-row">Sin movimientos en este periodo</td></tr>';
  } else {
    sorted.forEach(e => {
      const isIncome = e.tipo === "Ingreso";
      const badgeClass = isIncome ? "badge-green" : e.tipo==="Gasto fijo"?"badge-blue":"badge-red";
      tbody += `<tr>
        <td>${e.concepto}</td>
        <td><span class="badge ${badgeClass}">${e.tipo}</span></td>
        <td style="color:#999;font-size:12px">${e.categoria}</td>
        <td style="font-weight:700;${isIncome?'color:#22C55E':''}">${fmt(e.monto)}</td>
        <td style="color:#999;font-size:12px">${e.fecha}</td>
        <td><button class="del-btn" onclick="deleteEntry(${e.id})">✕</button></td>
      </tr>`;
    });
  }
  document.getElementById("tableBody").innerHTML = tbody;
}

function cardHTML(title, value, color, sub){
  return `<div class="card">
    <div class="card-label">${title}</div>
    <div class="card-value" style="color:${color}">${value}</div>
    ${sub?`<div class="card-sub">${sub}</div>`:""}
  </div>`;
}

function openModal(){
  document.getElementById("modalBg").style.display = "flex";
  document.getElementById("modalSub").textContent = tab==="agency"?"Finanzas Agencia":"Finanzas Personales";
  document.getElementById("personaField").style.display = tab==="agency"?"block":"none";
  
  const tipoSelect = document.getElementById("fTipo");
  const tipos = tab==="agency" ? ["Ingreso","Gasto"] : ["Ingreso","Gasto fijo","Gasto hormiga"];
  tipoSelect.innerHTML = tipos.map(t=>`<option value="${t}">${t}</option>`).join("");
  
  const catSelect = document.getElementById("fCategoria");
  const cats = tab==="agency" ? CATS_A : CATS_P;
  catSelect.innerHTML = '<option value="">Seleccionar</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join("");
  
  document.getElementById("fConcepto").value = "";
  document.getElementById("fMonto").value = "";
  document.getElementById("fFecha").value = "";
  document.getElementById("fPersona").value = "";
}

function closeModal(){
  document.getElementById("modalBg").style.display = "none";
}

function addEntry(){
  const concepto = document.getElementById("fConcepto").value;
  const monto = Number(document.getElementById("fMonto").value);
  const fecha = document.getElementById("fFecha").value;
  if(!concepto || !monto || !fecha) return;
  
  const entry = {
    id: Date.now(),
    concepto,
    tipo: document.getElementById("fTipo").value,
    categoria: document.getElementById("fCategoria").value,
    monto,
    fecha,
    persona: document.getElementById("fPersona").value
  };
  
  if(tab==="agency") agency.push(entry);
  else personal.push(entry);
  save();
  closeModal();
  render();
}

function deleteEntry(id){
  if(tab==="agency") agency = agency.filter(e=>e.id!==id);
  else personal = personal.filter(e=>e.id!==id);
  save();
  render();
}

document.getElementById("dateFrom").addEventListener("change", render);
document.getElementById("dateTo").addEventListener("change", render);

render();
</script>
</body>
</html>
